name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Ad-hoc sign app and DMG
        run: |
          # Ad-hoc sign the .app (deep, force) to ensure all nested binaries are signed
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 2 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing app at $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            codesign --verify --deep --strict "$APP_PATH" && echo "App signature verified"
          fi
          # Ad-hoc sign the DMG as well
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" -maxdepth 2 | head -n 1)
          if [ -n "$DMG_PATH" ]; then
            echo "Signing DMG at $DMG_PATH"
            codesign --force --sign - "$DMG_PATH"
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dispatch-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dispatch-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
